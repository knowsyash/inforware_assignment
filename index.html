<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management</title>
  <style>
    :root {
      --primary: #4F46E5;
      --bg: #F9FAFB;
      --text: #111827;
      --surface: #FFFFFF;
      --border: #E5E7EB;
    }
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      padding: 0;
      margin: 0; 
      background-color: var(--bg); 
      color: var(--text);
    }
    nav {
      background-color: #111827;
      color: #fff;
      padding: 1rem 2rem;
      margin-bottom: 2rem;
    }
    nav h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 500;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem 2rem;
    }
    .card {
      background: var(--surface);
      padding: 1.5rem;
      border-radius: 0.75rem;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      margin-bottom: 2rem;
      border: 1px solid var(--border);
    }
    .card-title {
      margin-top: 0;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.35rem;
      font-weight: 500;
      font-size: 0.875rem;
      color: #374151;
    }
    input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.35rem;
      box-sizing: border-box;
      font-size: 0.95rem;
      transition: border-color 0.15s;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    button {
      background-color: var(--primary);
      color: white;
      padding: 0.65rem 1.2rem;
      border: none;
      border-radius: 0.35rem;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover { background-color: #4338ca; }
    
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      border: 1px solid var(--border);
    }
    th, td {
      padding: 1rem 1.25rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }
    th { 
      background-color: #F9FAFB; 
      font-weight: 600; 
      color: #4B5563;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }
    tbody tr:last-child td { border-bottom: none; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.15rem 0.65rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .status-offline {
      background-color: #FEF3C7;
      color: #92400E;
    }
    .status-synced {
      background-color: #D1FAE5;
      color: #065F46;
    }
  </style>
</head>
<body>
  <nav>
    <h1>Inventory Management System</h1>
  </nav>

  <div class="container">
    <div class="card">
      <h2 class="card-title">Add New Item</h2>
      <form id="item-form">
        <div class="form-group">
          <label for="name">Item Name</label>
          <input type="text" id="name" required placeholder="e.g. Logitech MX Master 3" />
        </div>
        <div class="form-group">
          <label for="quantity">Quantity</label>
          <input type="number" id="quantity" required min="1" placeholder="e.g. 5" />
        </div>
        <button type="submit">Add Item</button>
      </form>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Quantity</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="item-list">
        <!-- Items are dynamically rendered here -->
      </tbody>
    </table>
  </div>
  
  <script src="./renderer.js"></script>
</body>
</html>
